name: Build release installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build installers
        run: bash .github/scripts/build-install.sh

      - name: Build dual CDN extension
        run: bash .github/scripts/build-dual-cdn.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers
          path: |
            dist/install.sh
            dist/install-xpadding.sh
            dist/add-dual-cdn.sh

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/install.sh
            dist/install-xpadding.sh
            dist/add-dual-cdn.sh
